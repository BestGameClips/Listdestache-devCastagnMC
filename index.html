<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checklist Serveur Minecraft</title>
<style>
  body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: #1e1e2f;
    color: #f0f0f0;
    margin: 0;
    padding: 0;
  }
  header {
    background: #3b3b5e;
    padding: 20px;
    text-align: center;
    font-size: 1.8em;
    font-weight: bold;
    letter-spacing: 1px;
  }
  .container {
    max-width: 900px;
    margin: 30px auto;
    padding: 20px;
    background: #2b2b3d;
    border-radius: 12px;
    box-shadow: 0 0 20px rgba(0,0,0,0.5);
  }
  ul {
    list-style: none;
    padding: 0;
  }
  li {
    background: #3b3b5e;
    margin: 10px 0;
    padding: 15px;
    border-radius: 8px;
    display: flex;
    align-items: center;
    transition: background 0.2s;
  }
  li:hover {
    background: #50507a;
  }
  input[type="checkbox"] {
    margin-right: 15px;
    width: 20px;
    height: 20px;
    cursor: pointer;
  }
  label {
    flex: 1;
    font-size: 1.1em;
    cursor: pointer;
  }
  button {
    background: #ff7f50;
    color: white;
    border: none;
    padding: 12px 20px;
    font-size: 1em;
    border-radius: 8px;
    cursor: pointer;
    margin-top: 15px;
    transition: background 0.2s;
  }
  button:hover {
    background: #ff5733;
  }
</style>
</head>
<body>

<header>Checklist Serveur Minecraft &lt;@&1475215325732671490&gt;</header>

<div class="container">
  <ul id="checklist">
    <li><input type="checkbox" id="roles"><label for="roles">Refaire tous les rôles du practice + permissions</label></li>
    <li><input type="checkbox" id="hologram"><label for="hologram">Mettre un hologramme au-dessus du trou + hub</label></li>
    <li><input type="checkbox" id="barrieres"><label for="barrieres">Mettre des barrières autour de la map Practice</label></li>
    <li><input type="checkbox" id="npc"><label for="npc">Ajouter des NPC au lobby</label></li>
    <li><input type="checkbox" id="commands"><label for="commands">Mettre /discord + /site</label></li>
    <li><input type="checkbox" id="tags"><label for="tags">Installer un plugin pour avoir des Tags</label></li>
    <li><input type="checkbox" id="scoreboard"><label for="scoreboard">Créer le scoreboard et le tab dans le practice</label></li>
    <li><input type="checkbox" id="mrr"><label for="mrr">Classement MRR Top1/Top2/Top3 avec NPC et trône au spawn FFA</label></li>
    <li><input type="checkbox" id="panneaux"><label for="panneaux">Panneaux au lobby et practice avec liens utiles (Discord, site)</label></li>
    <li><input type="checkbox" id="ejection"><label for="ejection">Plugin pour éjecter le joueur du spawn practice vers la map Practice</label></li>
    <li><input type="checkbox" id="zones"><label for="zones">Zones protégées (lobby, spawn FFA) + empêcher les perles (WorldGuard)</label></li>
  </ul>
  <button id="clearBtn">Réinitialiser les cases</button>
</div>

<script>
  const checkboxes = document.querySelectorAll('#checklist input[type="checkbox"]');
  const clearBtn = document.getElementById('clearBtn');

  // Sauvegarder l'état dans le localStorage
  checkboxes.forEach(cb => {
    const saved = localStorage.getItem(cb.id);
    if (saved === 'true') cb.checked = true;

    cb.addEventListener('change', () => {
      localStorage.setItem(cb.id, cb.checked);
    });
  });

  // Bouton réinitialiser
  clearBtn.addEventListener('click', () => {
    checkboxes.forEach(cb => {
      cb.checked = false;
      localStorage.setItem(cb.id, false);
    });
  });
</script>

</body>
</html>
